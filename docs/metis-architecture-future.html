<!doctype html>

<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
    --future: #d8b4fe;
    --future-edge: #a855f7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1e3a5f;
      --process: #3730a3;
      --storage: #115e59;
      --external: #78350f;
      --risk: #7f1d1d;
      --future: #4c1d95;
      --future-edge: #a855f7;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  main { max-width: 1000px; margin: 32px auto; padding: 0 20px; }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label  { font-size: 13px; font-weight: 600; fill: var(--fg); }
  .small  { font-size: 11px; fill: var(--muted); }
  .caption{ font-size: 12px; fill: var(--muted); text-anchor: middle; }
  .node   { stroke: var(--line); stroke-width: 1; rx: 6; ry: 6; }
  .neutral  { fill: var(--neutral); }
  .input    { fill: var(--input); }
  .process  { fill: var(--process); }
  .storage  { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk     { fill: var(--risk); }
  .future   { fill: var(--future); stroke: var(--future-edge); stroke-width: 2; stroke-dasharray: 6 3; }
  .edge   { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .fedge  { stroke: var(--future-edge); stroke-width: 2; fill: none; stroke-dasharray: 6 4; }
  .zone   { fill: none; stroke: var(--line); stroke-width: 1.5; stroke-dasharray: 8 4; opacity: 0.6; }
</style>
