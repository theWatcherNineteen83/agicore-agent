name: CI

on:
  push:
    branches: [master, "hardening-**", "evolution/**"]
  pull_request:
    branches: [master]

jobs:
  kernel-tests:
    name: Kernel build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Build + test kernel
        run: mvn -B -pl agicore-kernel -am clean test

  modules-tests:
    name: Modules build + tests
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: kernel-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Install MaryTTS local JAR
        run: |
          if [ -f agicore-modules/lib/voice-bits1-hsmm-5.2.jar ]; then
            mvn -B install:install-file \
              -Dfile=agicore-modules/lib/voice-bits1-hsmm-5.2.jar \
              -DgroupId=de.dfki.mary \
              -DartifactId=voice-bits1-hsmm \
              -Dversion=5.2 \
              -Dpackaging=jar
          fi

      - name: Build + test modules
        run: mvn -B -pl agicore-modules -am verify
