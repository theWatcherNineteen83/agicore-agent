name: CI

on:
  push:
    branches: [master, "hardening-**", "evolution/**"]
  pull_request:
    branches: [master]

jobs:
  kernel-tests:
    name: Kernel build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: maven-cache-${{ runner.os }}

      - name: Build + test kernel
        run: mvn -B -pl agicore-kernel -am clean test

      - name: Build watchdog
        run: mvn -B -pl agicore-watchdog -am -DskipTests package

  modules-tests:
    name: Modules build + tests
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: kernel-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: maven-cache-${{ runner.os }}

      - name: Install MaryTTS local JAR
        run: |
          if [ -f agicore-modules/lib/voice-bits1-hsmm-5.2.jar ]; then
            mvn -B install:install-file \
              -Dfile=agicore-modules/lib/voice-bits1-hsmm-5.2.jar \
              -DgroupId=de.dfki.mary \
              -DartifactId=voice-bits1-hsmm \
              -Dversion=5.2 \
              -Dpackaging=jar
          fi

      - name: Build + test modules
        run: mvn -B -pl agicore-modules -am verify

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: metis-sbom
          path: target/metis-sbom.json
          if-no-files-found: warn
