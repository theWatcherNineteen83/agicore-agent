name: CI

on:
  push:
    branches: [master, "hardening-**", "evolution/**"]
  pull_request:
    branches: [master]

jobs:
  kernel-tests:
    name: Kernel build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Maven
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-v2-${{ runner.os }}

      - name: Build + test kernel
        run: mvn -B -pl agicore-kernel -am clean test

      - name: Build watchdog
        run: mvn -B -pl agicore-watchdog -am -DskipTests package
