name: CI

on:
  push:
    branches: [master, "hardening-**", "evolution/**"]
  pull_request:
    branches: [master]

jobs:
  kernel-tests:
    name: Kernel build + tests (always run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zulu JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles("**/pom.xml") }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build + test kernel
        run: mvn -B -pl agicore-kernel -am clean test

      - name: Build watchdog
        run: mvn -B -pl agicore-watchdog -am -DskipTests package

      - name: Watchdog JAR SHA-256
        run: |
          for f in agicore-watchdog/target/*.jar; do
            [ -f "$f" ] && sha256sum "$f"
          done

  modules-tests:
    name: Modules build + tests (best-effort, MaryTTS repo)
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: kernel-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zulu JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles("**/pom.xml") }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Install local lib JARs (voice-bits1-hsmm)
        run: |
          if [ -f agicore-modules/lib/voice-bits1-hsmm-5.2.jar ]; then
            mvn -B install:install-file \
              -Dfile=agicore-modules/lib/voice-bits1-hsmm-5.2.jar \
              -DgroupId=de.dfki.mary \
              -DartifactId=voice-bits1-hsmm \
              -Dversion=5.2 \
              -Dpackaging=jar
          fi

      - name: Modules build + tests
        run: mvn -B -pl agicore-modules -am verify

      - name: Module JAR SHA-256
        run: |
          for f in agicore-modules/target/*.jar; do
            [ -f "$f" ] && sha256sum "$f"
          done

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: metis-sbom
          path: target/metis-sbom.json
          if-no-files-found: warn
